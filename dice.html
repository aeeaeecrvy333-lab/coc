<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC 骰子工具</title>
<style>
@font-face { font-family: 'hanyi-55'; src: local('hanyi-55'); font-display: swap; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body, div, span, p, h1, h2, h3, button, input, select, textarea, label {
  font-family: 'hanyi-55', sans-serif !important;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }

:root {
  --ink: #d8ecd8; --ink-dim: rgba(180,210,180,0.55);
  --bg: #1a2e1a; --bg-card: #243424; --bg-card2: #1e2a1e;
  --border: #4a7a4a; --border-hi: #7ab87a;
  --green: #7ab87a; --green-light: #9ad09a;
  --red: #c04040; --red-light: #e06060;
  --gold: #c8a84c; --gold-light: #e0c870;
}
html, body { overflow-x: hidden; width: 100%; }
body { background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

/* TOPBAR */
.topbar { width: 100%; background: var(--bg-card2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 1rem; gap: 0.8rem; flex-shrink: 0; box-sizing: border-box; }
.topbar-brand { font-size: 0.78rem; letter-spacing: 0.2em; color: var(--border-hi); font-weight: bold; text-transform: uppercase; white-space: nowrap; }
.topbar-right { display: flex; align-items: center; gap: 0.7rem; }
.user-badge { display: flex; align-items: center; gap: 0.4rem; padding: 0.28rem 0.7rem; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; transition: border-color 0.15s; }
.user-badge:hover { border-color: var(--border-hi); }
.user-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.user-name { font-size: 0.8rem; color: var(--ink); }
.login-btn { padding: 0.28rem 0.9rem; background: transparent; border: 1px solid var(--border); color: var(--border-hi); font-size: 0.78rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.login-btn:hover { background: rgba(74,122,74,0.2); border-color: var(--border-hi); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(10,20,10,0.75); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 0 0 3px var(--bg-card2), 0 0 0 4px var(--border), 0 20px 50px rgba(0,0,0,0.6); padding: 1.8rem 1.6rem 1.4rem; width: min(340px, 90vw); transform: translateY(-10px); transition: transform 0.2s; }
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-size: 1rem; font-weight: bold; color: var(--border-hi); letter-spacing: 0.15em; margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid rgba(74,122,74,0.3); }
.modal-field { margin-bottom: 1rem; }
.modal-label { display: block; font-size: 0.75rem; letter-spacing: 0.12em; color: var(--border-hi); margin-bottom: 0.35rem; font-weight: bold; }
.modal-inp { width: 100%; background: var(--bg-card2); border: 1px solid var(--border); border-bottom: 2px solid var(--border); color: var(--ink); font-size: 0.95rem; padding: 0.55rem 0.7rem; outline: none; transition: border-color 0.2s; font-family: 'hanyi-55', sans-serif !important; }
.modal-inp:focus { border-color: var(--border-hi); }
.modal-hint { font-size: 0.72rem; color: var(--ink-dim); margin-top: 0.3rem; }
.modal-btns { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
.modal-confirm { flex: 1; padding: 0.7rem; background: var(--border-hi); color: var(--bg-card2); border: none; font-size: 0.88rem; font-weight: bold; letter-spacing: 0.15em; cursor: pointer; transition: background 0.15s; }
.modal-confirm:hover { background: var(--green-light); }
.modal-cancel { padding: 0.7rem 1rem; background: transparent; color: var(--ink-dim); border: 1px solid rgba(74,122,74,0.3); font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s; }
.modal-cancel:hover { border-color: var(--border); color: var(--ink); }
.modal-logout-row { margin-top: 0.8rem; text-align: center; }
.modal-logout { background: none; border: none; color: var(--red-light); font-size: 0.72rem; cursor: pointer; letter-spacing: 0.08em; text-decoration: underline; }

/* LAYOUT */
.main-wrap { width: 100%; max-width: 1000px; padding: 1.8rem 1.4rem 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; align-items: start; justify-self: center; }
@media(max-width: 700px) { .main-wrap { grid-template-columns: 1fr; padding: 1rem 0.7rem 3rem; width: 100%; box-sizing: border-box; } }

/* HEADER */
.hd { text-align: center; grid-column: 1 / -1; margin-bottom: 0; }
.hd-eye { font-size: 10px; letter-spacing: 0.35em; color: var(--border-hi); text-transform: uppercase; opacity: 0.6; margin-bottom: 0.4rem; }
.hd-title { font-size: 2rem; font-weight: bold; color: var(--ink); margin-bottom: 0.3rem; text-shadow: 0 0 24px rgba(122,184,122,0.2); }
.hd-div { display: flex; align-items: center; gap: 0.5rem; margin: 0.4rem 0; }
.hd-div::before, .hd-div::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }
.hd-div-icon { color: var(--border); font-size: 13px; opacity: 0.6; }

/* CARD */
.card { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 0 0 3px var(--bg-card2), 0 0 0 4px var(--border), 0 10px 36px rgba(0,0,0,0.45); padding: 1.6rem 1.5rem 1.4rem; position: relative; min-width: 0; }
.card-full { grid-column: 1 / -1; }
.corner { position: absolute; font-size: 9px; color: var(--green); opacity: 0.3; }
.corner.tl { top: 8px; left: 8px; } .corner.br { bottom: 8px; right: 8px; }
.sec-title { font-size: 0.78rem; letter-spacing: 0.15em; color: var(--border-hi); text-transform: uppercase; margin-bottom: 0.9rem; padding-left: 0.45rem; border-left: 3px solid var(--border); font-weight: bold; }

/* DICE GRID */
.dice-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
@media(max-width: 700px) {
  .dice-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
  .dice-btn { aspect-ratio: auto; padding: 0.5rem 0.3rem; min-height: 2.4rem; }
  .dice-btn .d-label { font-size: 1rem; }
}
@media(min-width: 701px) and (max-width: 960px) { .dice-grid { grid-template-columns: repeat(4, 1fr); } }

.dice-btn { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-card2); border: 1px solid var(--border); color: var(--border-hi); cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.08s; user-select: none; position: relative; padding: 0.3rem; }
.dice-btn:hover { border-color: var(--border-hi); background: rgba(74,122,74,0.2); }
.dice-btn:active { transform: scale(0.88); }
.dice-btn.active { border-color: var(--border-hi); background: rgba(74,122,74,0.22); box-shadow: 0 0 0 1px var(--border-hi) inset; }
.dice-btn .d-label { font-size: 0.78rem; letter-spacing: 0.04em; color: var(--ink); font-weight: bold; }
.dice-btn .d-count { position: absolute; top: 3px; right: 5px; font-size: 0.62rem; color: var(--gold); font-weight: bold; }

/* CONTROLS */
.ctrl-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem; flex-wrap: wrap; }
.ctrl-label { font-size: 0.72rem; color: var(--ink-dim); white-space: nowrap; letter-spacing: 0.06em; min-width: 2rem; }
.cnt-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.cnt-btn { padding: 0.5rem 0.85rem; background: var(--bg-card2); border: 1px solid var(--border); color: var(--border-hi); font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.12s; }
.cnt-btn:hover { background: rgba(74,122,74,0.2); }
.cnt-btn.active { background: var(--border); color: var(--ink); border-color: var(--border-hi); }
.cnt-custom, .mod-inp, .reason-inp { background: var(--bg-card2); border: none; border-bottom: 1.5px solid rgba(74,122,74,0.45); color: var(--ink); outline: none; padding: 0.25rem 0.35rem; transition: border-color 0.15s; font-family: 'hanyi-55', sans-serif !important; }
.cnt-custom:focus, .mod-inp:focus, .reason-inp:focus { border-bottom-color: var(--border-hi); }
.cnt-custom { width: 42px; font-size: 0.95rem; font-weight: bold; text-align: center; }
.mod-inp { width: 52px; font-size: 0.88rem; font-weight: bold; text-align: center; }
.reason-inp { flex: 1; min-width: 0; font-size: 0.82rem; max-width: 100%; }
.reason-inp::placeholder { color: rgba(150,200,150,0.35); font-size: 0.78rem; }

/* FORMULA */
.formula-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.8rem; background: var(--bg-card2); border: 1px dashed var(--border); margin-bottom: 1rem; }
.formula-lbl { font-size: 0.68rem; color: var(--ink-dim); white-space: nowrap; }
.formula-txt { flex: 1; font-size: 0.95rem; font-weight: bold; color: var(--green-light); letter-spacing: 0.03em; min-height: 1.3em; }

/* BUTTONS */
.roll-btn { width: 100%; padding: 0.9rem; background: var(--border-hi); color: var(--bg-card2); border: 1px solid var(--border); font-size: 0.95rem; letter-spacing: 0.22em; cursor: pointer; font-weight: bold; transition: background 0.15s, letter-spacing 0.15s, box-shadow 0.15s; text-transform: uppercase; }
.roll-btn:hover { background: var(--green-light); letter-spacing: 0.3em; box-shadow: 0 0 16px rgba(122,184,122,0.25); }
.roll-btn:active { transform: scale(0.99); }
.roll-btn:disabled { opacity: 0.35; cursor: default; }
.clear-btn { width: 100%; margin-top: 0.45rem; padding: 0.45rem; background: transparent; color: var(--ink-dim); border: 1px solid rgba(74,122,74,0.25); font-size: 0.72rem; letter-spacing: 0.12em; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.clear-btn:hover { border-color: var(--border); color: var(--ink); }

/* RESULT */
.result-wrap { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.result-wrap.show { opacity: 1; pointer-events: auto; }
.result-formula-txt { font-size: 0.72rem; color: var(--ink-dim); margin-bottom: 0.7rem; letter-spacing: 0.06em; }
.result-rolls { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 0.9rem; }
.result-die { display: flex; flex-direction: column; align-items: center; padding: 0.5rem 0.65rem; background: var(--bg-card2); border: 1px solid var(--border); min-width: 50px; animation: dieIn 0.28s ease both; }
@keyframes dieIn { from { opacity: 0; transform: scale(0.78) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.result-die .rdt { font-size: 0.58rem; color: var(--ink-dim); }
.result-die .rdv { font-size: 1.6rem; font-weight: bold; color: var(--green-light); line-height: 1.1; }
.result-die.max .rdv { color: var(--gold-light); text-shadow: 0 0 8px rgba(200,168,76,0.4); }
.result-die.min .rdv { color: var(--red-light); }
.total-row { display: flex; align-items: baseline; gap: 0.7rem; padding-top: 0.75rem; border-top: 1px solid rgba(74,122,74,0.28); }
.total-lbl { font-size: 0.72rem; color: var(--ink-dim); letter-spacing: 0.1em; }
.total-num { font-size: 3rem; font-weight: bold; color: var(--green-light); line-height: 1; text-shadow: 0 0 14px rgba(122,184,122,0.25); }
.total-break { font-size: 0.75rem; color: var(--ink-dim); align-self: center; }

/* HISTORY */
.hist-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.7rem; }
.hist-title-txt { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--ink-dim); text-transform: uppercase; padding-left: 0.4rem; border-left: 2px solid rgba(74,122,74,0.35); }
.hist-clear { background: none; border: none; color: rgba(180,120,120,0.5); font-size: 0.68rem; cursor: pointer; }
.hist-clear:hover { color: var(--red-light); }
.hist-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 400px; overflow-y: auto; }
.hist-list::-webkit-scrollbar { width: 4px; }
.hist-list::-webkit-scrollbar-thumb { background: var(--border); }
.hist-item { padding: 0.5rem 0.7rem; background: rgba(26,46,26,0.5); border: 1px solid rgba(74,122,74,0.18); font-size: 0.78rem; animation: histIn 0.22s ease; display: grid; grid-template-columns: auto 1fr auto auto; gap: 0.3rem 0.5rem; align-items: center; }
@keyframes histIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }
.hist-who { font-size: 0.65rem; color: var(--gold); font-weight: bold; white-space: nowrap; }
.hist-formula { color: var(--ink-dim); font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-total { font-weight: bold; color: var(--green-light); font-size: 0.95rem; text-align: right; }
.hist-time { font-size: 0.6rem; color: var(--ink-dim); white-space: nowrap; text-align: right; }
.hist-dice { font-size: 0.65rem; color: rgba(150,200,150,0.4); grid-column: 2 / -1; }
.hist-reason { font-size: 0.68rem; color: var(--gold); opacity: 0.75; grid-column: 1 / -1; font-style: italic; }
.hist-empty { color: var(--ink-dim); font-size: 0.78rem; font-style: italic; padding: 1rem 0; text-align: center; }
.hist-loading { text-align: center; padding: 1rem; color: var(--ink-dim); font-size: 0.78rem; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">CoC · Dice</div>
  <div class="topbar-right">
    <div id="userBadge" class="user-badge" onclick="openModal()" style="display:none">
      <div class="user-dot" id="userDot"></div>
      <span class="user-name" id="userNameDisplay"></span>
    </div>
    <button class="login-btn" id="loginBtn" onclick="openModal()">设置昵称</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">设置投骰者昵称</div>
    <div class="modal-field">
      <label class="modal-label">昵称</label>
      <input class="modal-inp" id="nicknameInp" type="text" placeholder="输入你的名字" maxlength="20">
      <div class="modal-hint">昵称会显示在投骰记录里，让大家知道是谁投的</div>
    </div>
    <div class="modal-btns">
      <button class="modal-confirm" onclick="saveNickname()">确认</button>
      <button class="modal-cancel" onclick="closeModal()">取消</button>
    </div>
    <div class="modal-logout-row" id="logoutRow" style="display:none">
      <button class="modal-logout" onclick="clearNickname()">清除昵称（匿名模式）</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <div class="hd">
    <div class="hd-eye">Call of Cthulhu · Dice Roller</div>
    <div class="hd-title">骰子工具</div>
    <div class="hd-div"><span class="hd-div-icon">✦</span></div>
  </div>

  <!-- LEFT: BUILDER -->
  <div class="card">
    <span class="corner tl">◤</span><span class="corner br">◢</span>
    <div class="sec-title">选择骰子</div>
    <div class="dice-grid" id="diceGrid"></div>

    <div class="ctrl-row">
      <span class="ctrl-label">骰数</span>
      <div class="cnt-btns" id="cntBtns">
        <button class="cnt-btn active" data-n="1">1</button>
        <button class="cnt-btn" data-n="2">2</button>
        <button class="cnt-btn" data-n="3">3</button>
        <button class="cnt-btn" data-n="4">4</button>
        <button class="cnt-btn" data-n="5">5</button>
      </div>
      <input class="cnt-custom" id="cntCustom" type="number" min="1" max="99" placeholder="?">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">加值</span>
      <input class="mod-inp" id="modInp" type="number" placeholder="0">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">原因</span>
      <input class="reason-inp" id="reasonInp" type="text" placeholder="此次投骰的原因（选填）" maxlength="60">
    </div>
    <div class="formula-bar">
      <span class="formula-lbl">公式</span>
      <span class="formula-txt" id="formulaTxt">—</span>
    </div>
    <button class="roll-btn" id="rollBtn" disabled>投 骰</button>
    <button class="clear-btn" onclick="clearPool()">✕ 清除公式</button>
  </div>

  <!-- RIGHT: RESULT -->
  <div class="card">
    <span class="corner tl">◤</span><span class="corner br">◢</span>
    <div class="sec-title">结果</div>
    <div class="result-wrap" id="resultWrap">
      <div class="result-formula-txt" id="resultFormulaTxt"></div>
      <div class="result-rolls" id="resultRolls"></div>
      <div class="total-row">
        <span class="total-lbl">合计</span>
        <span class="total-num" id="totalNum">—</span>
        <span class="total-break" id="totalBreak"></span>
      </div>
    </div>
    <div id="resultPlaceholder" style="color:var(--ink-dim);font-size:0.78rem;text-align:center;padding:2.5rem 0;">在左边选择骰子后投骰</div>
  </div>

  <!-- HISTORY -->
  <div class="card card-full">
    <span class="corner tl">◤</span><span class="corner br">◢</span>
    <div class="hist-head">
      <div class="hist-title-txt">历史记录（共享）</div>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-loading" id="histLoading">正在从数据库加载…</div>
    </div>
  </div>
</div>

<script>
(function(){
var SB_URL = 'https://dgozozaipjuogjgcwcsd.supabase.co';
var SB_KEY = 'sb_publishable_isMzFIdMPDB1O7xc7XsUyQ_tfPYWz9Q';
var TABLE = 'dice_rolls';
var DICE = [4, 6, 8, 10, 12, 20, 100];
var pool = [], currentCount = 1, nickname = localStorage.getItem('dice_nickname') || '', historyItems = [];

/* ── NICKNAME ── */
function updateUserUI(){
  var badge = document.getElementById('userBadge');
  var btn = document.getElementById('loginBtn');
  if(nickname){ badge.style.display='flex'; btn.style.display='none'; document.getElementById('userNameDisplay').textContent=nickname; }
  else { badge.style.display='none'; btn.style.display='block'; }
}
window.openModal=function(){
  document.getElementById('nicknameInp').value=nickname;
  document.getElementById('logoutRow').style.display=nickname?'block':'none';
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(function(){ document.getElementById('nicknameInp').focus(); },150);
};
window.closeModal=function(){ document.getElementById('modalOverlay').classList.remove('show'); };
window.closeModalOutside=function(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); };
window.saveNickname=function(){
  var v=document.getElementById('nicknameInp').value.trim();
  if(!v){ document.getElementById('nicknameInp').style.borderBottomColor='var(--red)'; return; }
  nickname=v; localStorage.setItem('dice_nickname',nickname); updateUserUI(); closeModal();
};
window.clearNickname=function(){ nickname=''; localStorage.removeItem('dice_nickname'); updateUserUI(); closeModal(); };
document.getElementById('nicknameInp').addEventListener('keydown',function(e){ if(e.key==='Enter') saveNickname(); });

/* ── SUPABASE ── */
function sbH(){ return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'}; }
async function sbInsert(row){
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+TABLE,{method:'POST',headers:sbH(),body:JSON.stringify(row)});
    return r.ok;
  }catch(e){return false;}
}
async function sbLoad(limit){
  limit=limit||60;
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+TABLE+'?select=*&order=created_at.desc&limit='+limit,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){return null;}
}

/* ── DICE GRID ── */
var grid=document.getElementById('diceGrid');
DICE.forEach(function(d){
  var btn=document.createElement('button');
  btn.className='dice-btn'; btn.dataset.sides=d;
  btn.innerHTML='<span class="d-label">D'+d+'</span><span class="d-count" id="dc'+d+'"></span>';
  btn.addEventListener('click',function(){ addDie(d); });
  grid.appendChild(btn);
});

/* ── COUNT ── */
var cntBtns=document.querySelectorAll('.cnt-btn');
var cntCustom=document.getElementById('cntCustom');
cntBtns.forEach(function(b){
  b.addEventListener('click',function(){
    currentCount=parseInt(b.dataset.n);
    cntBtns.forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); cntCustom.value='';
  });
});
cntCustom.addEventListener('input',function(){
  var v=parseInt(cntCustom.value);
  if(v>0&&v<=99){ currentCount=v; cntBtns.forEach(function(x){x.classList.remove('active');}); }
});

/* ── POOL ── */
function addDie(sides){
  var idx=pool.findIndex(function(p){return p.sides===sides;});
  if(idx>-1){
    // already selected: toggle off
    pool.splice(idx,1);
  } else {
    pool.push({sides:sides,count:currentCount});
  }
  updateFormula();
}
window.clearPool=function(){
  pool=[]; document.getElementById('modInp').value=''; updateFormula();
};
function updateFormula(){
  pool.sort(function(a,b){return a.sides-b.sides;});
  DICE.forEach(function(d){
    var badge=document.getElementById('dc'+d);
    var found=pool.find(function(p){return p.sides===d;});
    badge.textContent=found?'×'+found.count:'';
    var btn=document.querySelector('.dice-btn[data-sides="'+d+'"]');
    if(found) btn.classList.add('active'); else btn.classList.remove('active');
  });
  var mod=parseInt(document.getElementById('modInp').value)||0;
  if(pool.length===0){ document.getElementById('formulaTxt').textContent='—'; document.getElementById('rollBtn').disabled=true; return; }
  var parts=pool.map(function(p){return p.count+'D'+p.sides;});
  var str=parts.join(' + ');
  if(mod!==0) str+=(mod>0?' + ':' ')+mod;
  document.getElementById('formulaTxt').textContent=str;
  document.getElementById('rollBtn').disabled=false;
}
document.getElementById('modInp').addEventListener('input',updateFormula);

/* ── ROLL ── */
function rand(s){return Math.floor(Math.random()*s)+1;}
document.getElementById('rollBtn').addEventListener('click',doRoll);
document.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!document.getElementById('rollBtn').disabled) doRoll(); });

async function doRoll(){
  if(pool.length===0) return;
  var mod=parseInt(document.getElementById('modInp').value)||0;
  var reason=document.getElementById('reasonInp').value.trim();
  var allRolls=[];
  pool.forEach(function(p){ for(var i=0;i<p.count;i++) allRolls.push({sides:p.sides,val:rand(p.sides)}); });
  var diceSum=allRolls.reduce(function(s,r){return s+r.val;},0);
  var total=diceSum+mod;
  var parts=pool.map(function(p){return p.count+'D'+p.sides;});
  var formulaBase=parts.join(' + ');
  if(mod!==0) formulaBase+=(mod>0?' + ':' ')+mod;

  /* show result */
  var rw=document.getElementById('resultWrap');
  var rp=document.getElementById('resultPlaceholder');
  rp.style.display='none';
  rw.classList.remove('show');
  setTimeout(function(){
    document.getElementById('resultFormulaTxt').textContent='公式：'+formulaBase+(reason?'（'+reason+'）':'');
    var rollsEl=document.getElementById('resultRolls');
    rollsEl.innerHTML='';
    allRolls.forEach(function(r,idx){
      var div=document.createElement('div');
      div.className='result-die'+(r.val===r.sides?' max':'')+(r.val===1?' min':'');
      div.style.animationDelay=(idx*50)+'ms';
      div.innerHTML='<span class="rdt">D'+r.sides+'</span><span class="rdv">'+r.val+'</span>';
      rollsEl.appendChild(div);
    });
    document.getElementById('totalNum').textContent=total;
    var bp=[];
    if(allRolls.length>1) bp.push('骰子合计 '+diceSum);
    if(mod!==0) bp.push((mod>0?'+':'')+mod+' 修正');
    document.getElementById('totalBreak').textContent=bp.join(' · ');
    rw.classList.add('show');
  },60);

  /* save */
  var row={roller_name:nickname||'匿名',formula:formulaBase,dice_results:allRolls.map(function(r){return r.val;}).join(','),total:total,reason:reason||null};
  sbInsert(row);

  /* prepend to local list */
  historyItems.unshift(Object.assign({},row,{created_at:new Date().toISOString()}));
  if(historyItems.length>80) historyItems.pop();
  renderHistory();
}

/* ── HISTORY ── */
function fmtTime(iso){
  try{var d=new Date(iso);return (d.getMonth()+1)+'/'+(d.getDate())+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}catch(e){return '';}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderHistory(){
  var list=document.getElementById('histList');
  if(historyItems.length===0){list.innerHTML='<div class="hist-empty">尚无记录</div>';return;}
  list.innerHTML=historyItems.map(function(h,i){
    var rollArr=(h.dice_results||'').split(',').filter(Boolean);
    var rollDisplay=rollArr.length<=14?'[ '+rollArr.join(', ')+' ]':'[ '+rollArr.slice(0,14).join(', ')+'… ]';
    var reasonHtml=h.reason?'<div class="hist-reason">因为 '+esc(h.reason)+'</div>':'';
    return '<div class="hist-item" style="animation-delay:'+(i*15)+'ms">'
      +'<span class="hist-who">'+esc(h.roller_name)+'</span>'
      +'<span class="hist-formula">'+esc(h.formula)+'</span>'
      +'<span class="hist-total">'+h.total+'</span>'
      +'<span class="hist-time">'+fmtTime(h.created_at)+'</span>'
      +'<span class="hist-dice" style="grid-column:2/-1;">'+rollDisplay+'</span>'
      +reasonHtml
      +'</div>';
  }).join('');
}

async function loadHistory(){
  var data=await sbLoad(60);
  document.getElementById('histLoading').style.display='none';
  if(data&&data.length){ historyItems=data; renderHistory(); }
  else if(!data){ document.getElementById('histList').innerHTML='<div class="hist-empty">无法连接数据库 — 记录仅在本次会话可见<br><small style="font-size:0.65rem;opacity:0.6;">请确认 dice_rolls 表已创建</small></div>'; }
  else { renderHistory(); }
}

updateUserUI();
loadHistory();
})();
</script>
